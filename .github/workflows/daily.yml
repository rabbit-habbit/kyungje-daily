name: Daily Brief

on:
  schedule:
    # 매일 평일 (월-금) 다중 cron으로 신뢰성 보강.
    # GitHub Actions schedule은 best-effort라 skip되는 경우가 있어 3번 시도.
    # run.py가 같은 날 archive 존재 시 자동 skip (idempotent) → 비용은 한 번분만.
    - cron: '37 1 * * 1-5'   # KST 10:37 (1차)
    - cron: '7 2 * * 1-5'    # KST 11:07 (백업1)
    - cron: '47 2 * * 1-5'   # KST 11:47 (백업2)
  workflow_dispatch:

permissions:
  # run.py가 docs/를 commit + push 해야 하므로
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Seoul
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: claude-sonnet-4-6
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run pipeline (RSS → indicators → Claude → render → push)
        # 수동 dispatch는 항상 강제 재생성, schedule은 idempotent (오늘 archive 있으면 skip)
        run: python pipeline/run.py --push ${{ github.event_name == 'workflow_dispatch' && '--force' || '' }}

      - name: Upload intermediate JSONs as artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-${{ github.run_id }}
          path: |
            out/
          retention-days: 7
